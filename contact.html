<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Thomas Soleil</title>
<link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <meta name="description" content="Une question, un devis ou un projet photo ? Contactez Thomas Soleil, photographe à Toulouse. Réponse sous 24h.">
    
    <meta property="og:title" content="Contact | Thomas Soleil">
    <meta property="og:description" content="Parlons de votre projet photo. Contactez-moi pour un devis ou une question.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.tsoleil.fr/contact.html">
    <meta property="og:image" content="https://www.tsoleil.fr/images/hero-photo-accueil_2.webp">
</head>
<body>
<nav></nav>
    <main class="content-wrapper">
        <div class="contact-header">
            <h1>Parlons de votre projet.</h1>
            <p>Une question, un devis ? Je vous réponds sous 24h.</p>
        </div>

        <form action="https://formspree.io/f/xblwgnop" method="POST">
            <div class="form-group">
                <label>Votre Nom</label>
                <input type="text" name="nom" required>
            </div>
            <div class="form-group">
                <label>Votre Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Votre Message</label>
                <textarea name="message" rows="4" required></textarea>
            </div>
            <button type="submit">Envoyer</button>
        </form>

    </main>

    <script src="js/main.js"></script>
    <footer>

</footer>
</body>
</html>
